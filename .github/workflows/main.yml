name: BINGO Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # 每 5 分鐘執行一次

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install beautifulsoup4 pandas requests pytz
          
      - name: Run script
        run: python main.py
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 抓取遠端最新變更
          git fetch origin main
          
          # 2. 合併遠端變更，如果衝突強制使用本地生成的 data.csv
          git merge origin/main --no-edit
          
          # 3. 加入變更
          git add data.csv
          
          # 4. 檢查是否有變更並推送
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update data.csv"
            git push origin main
          else
            echo "沒有資料變更，跳過推播。"
          fi
