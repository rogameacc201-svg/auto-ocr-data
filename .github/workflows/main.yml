name: BINGO Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install beautifulsoup4 pandas requests pytz
      
      - name: Run script
        run: python main.py
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 檢查是否有變更
          if [ -n "$(git status --porcelain data.csv)" ]; then
            git add data.csv
            git commit -m "Auto-update data.csv"
            git push origin main
          else
            echo "沒有變更，跳過推播。"
          fi
