name: BINGO Update
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v3
      - run: pip install beautifulsoup4 pandas requests
      - run: python main.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add data.csv
          git commit -m "Update" || echo "No changes"
          git push
