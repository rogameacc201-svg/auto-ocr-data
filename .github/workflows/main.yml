- name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium beautifulsoup4 pandas
        # 額外安裝 Chromium 驅動相關依賴
        sudo apt-get update
        sudo apt-get install -y chromium-chromedriver

    - name: Run script
      run: |
        python main.py
