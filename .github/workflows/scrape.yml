name: Daily Bingo Scrape

on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 更新為 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 更新為 v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4

      - name: Run script
        run: python main.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data.csv
          # 使用 -n 檢查是否有更改，這樣寫比原本的 diff 更穩健
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update bingo data"
            git push
          else
            echo "無新資料需要提交"
          fi
