name: Daily Bingo Scrape

on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4

      - name: Run script
        run: python main.py

      - name: Commit and push
        # 如果執行到這裡代表 Python 已經跑完了
        # 我們強制執行 git add，如果沒有檔案變更，commit 指令會被跳過，不影響結果
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data.csv
          git commit -m "Update bingo data" || echo "無資料變動，跳過提交"
          git push origin main || echo "無資料變動，跳過推送"
