name: Daily Bingo Scrape

on:
  schedule:
    # 每 5 分鐘執行一次
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 強制升級環境，解決 Node.js 20 貶值警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4

      - name: Run script
        # 即使 Python 執行發生異常，這裡也標記為成功，方便查看輸出結果
        run: python main.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # 檢查是否有檔案變動 (data.csv)
          git add data.csv
          if git diff --staged --quiet; then
            echo "沒有檢測到 data.csv 的變動，跳過提交。"
          else
            git commit -m "Auto-update data.csv"
            git push origin main
            echo "data.csv 已更新並推送到遠端倉庫。"
          fi
