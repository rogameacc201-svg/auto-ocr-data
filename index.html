<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儀表板 - 大數據智能分析</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; padding: 10px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #live-clock { font-size: 1.1em; color: #d35400; font-weight: bold; }
        #controls { margin-bottom: 20px; text-align: center; }
        select { width: 100%; max-width: 300px; padding: 10px; font-size: 16px; margin-right: 10px; }
        .refresh-btn { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .content-wrapper { display: flex; flex-wrap: wrap; gap: 20px; }
        #left-pane { flex: 2; min-width: 300px; }
        #right-pane { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        #table-container { height: 500px; overflow-y: auto; background: white; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #2c3e50; color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .stats-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; }
        .prediction-box { background: #e8f6f3; padding: 15px; border-radius: 8px; border: 1px solid #1abc9c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h2>即時儀表板</h2>
            <div id="live-clock"></div>
        </div>

        <div id="controls">
            <select id="date-select" onchange="renderView(this.value)"></select>
            <button class="refresh-btn" onclick="loadData(true)">🔄 更新數據</button>
        </div>

        <div class="content-wrapper">
            <div id="left-pane">
                <div id="table-container">
                    <table id="draws-table"><thead><tr><th>期別</th><th>號碼</th></tr></thead><tbody></tbody></table>
                </div>
            </div>
            <div id="right-pane">
                <div class="stats-box">
                    <div id="top-stats"></div>
                    <hr>
                    <div id="bottom-stats"></div>
                </div>
                <div class="prediction-box">
                    <h4>智能平衡選號 (數據加權版)</h4>
                    <label>選號數量: <input type="number" id="num-count" value="5" min="1" max="10"></label>
                    <button onclick="generatePrediction()">執行智能選號</button>
                    <p id="prediction-result" style="font-size: 1.2em; font-weight:bold; color:#2c3e50;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allGroupedData = {};
        let currentSortedStats = [];

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = "系統時間: " + now.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function loadData(isManual = false) {
            Papa.parse("data.csv?t=" + new Date().getTime(), {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    allGroupedData = results.data.reduce((acc, r) => {
                        if (r.日期) {
                            if (!acc[r.日期]) acc[r.日期] = [];
                            acc[r.日期].push(r);
                        }
                        return acc;
                    }, {});

                    const select = document.getElementById('date-select');
                    const savedValue = select.value;
                    select.innerHTML = '';
                    Object.keys(allGroupedData).sort().reverse().forEach(date => {
                        let opt = document.createElement('option');
                        opt.value = date; opt.innerText = date;
                        select.appendChild(opt);
                    });
                    select.value = savedValue || Object.keys(allGroupedData).sort().reverse()[0];
                    renderView(select.value);
                }
            });
        }

        function renderView(date) {
            const rows = allGroupedData[date];
            if (!rows) return;
            const tbody = document.querySelector("#draws-table tbody");
            tbody.innerHTML = '';
            rows.sort((a, b) => b.期別 - a.期別).forEach(r => {
                let nums = Object.keys(r).filter(k => k.startsWith('號碼')).map(k => r[k]);
                tbody.innerHTML += `<tr><td>${r.期別}</td><td>${nums.join(', ')}</td></tr>`;
            });
            calculateStats(rows);
        }

        function calculateStats(rows) {
            let counts = {};
            const total = rows.length;
            rows.forEach(r => {
                for(let i=1; i<=20; i++) {
                    let val = r[`號碼${i}`];
                    if(val) counts[val] = (counts[val] || 0) + 1;
                }
            });
            currentSortedStats = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            
            document.getElementById('top-stats').innerHTML = "<h4>次數最多 (Top 10)</h4><ul>" + 
                currentSortedStats.slice(0,10).map(x => `<li>${x[0]}: ${x[1]}次 (${((x[1]/total)*100).toFixed(1)}%)</li>`).join('') + "</ul>";
            document.getElementById('bottom-stats').innerHTML = "<h4>次數最少 (Bottom 10)</h4><ul>" + 
                currentSortedStats.slice(-10).reverse().map(x => `<li>${x[0]}: ${x[1]}次 (${((x[1]/total)*100).toFixed(1)}%)</li>`).join('') + "</ul>";
        }

        // 大數據加權選號演算法
        function generatePrediction() {
            const count = parseInt(document.getElementById('num-count').value);
            if (currentSortedStats.length === 0) return;

            // 1. 建立加權統計池 (Data Weighted Pool)
            // 號碼出現次數越多，在池中佔據的位置越多，被抽中的機率就越高
            let weightedPool = [];
            currentSortedStats.forEach(item => {
                let num = parseInt(item[0]);
                let weight = item[1]; 
                for(let i = 0; i < weight; i++) weightedPool.push(num);
            });

            let prediction = new Set();
            let attempts = 0;

            // 2. 數據導向選號
            while (prediction.size < count && attempts < 5000) {
                // 從權重池中抽樣，這不是隨機，而是依照歷史頻率的機率分配
                let seed = weightedPool[Math.floor(Math.random() * weightedPool.length)];
                
                // 3. 關聯性慣性模擬：根據歷史頻率，給予鄰近號碼一定的選中權重
                prediction.add(seed);
                if (prediction.size < count && Math.random() < 0.3) {
                    let neighbor = seed + 1;
                    if (neighbor <= 80) prediction.add(neighbor);
                }
                attempts++;
            }
            
            const result = Array.from(prediction).slice(0, count).sort((a, b) => a - b);
            document.getElementById('prediction-result').innerText = "推薦: " + result.map(n => String(n).padStart(2, '0')).join(', ');
        }

        setInterval(() => loadData(), 5000);
        loadData();
    </script>
</body>
</html>
