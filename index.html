<!DOCTYPE html>
<html>
<body>
    <h1>即時抓取數據</h1>
    <div id="data-display">讀取中...</div>

    <script>
        // 這裡填入你 Google Sheet 的發佈連結 JSON 格式
        // 做法：在 Google Sheet 點「檔案」->「共用」->「發佈到網路」
        // 選 CSV 或網頁，但為了自動化，建議使用 Firebase 或 Google Apps Script 讀取
        
        async function fetchData() {
            // 建議使用 Google Apps Script 將資料轉為 JSON 發佈，這是最穩定的做法
            // 目前先測試顯示簡單訊息
            document.getElementById('data-display').innerText = "資料已同步至 binbin 表格: " + new Date().toLocaleTimeString();
        }
        setInterval(fetchData, 60000); // 每分鐘更新一次
        fetchData();
    </script>
</body>
</html>
