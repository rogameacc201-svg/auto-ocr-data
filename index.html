<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時監控面板</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .tab-btn { padding: 10px 15px; margin-right: 5px; cursor: pointer; border: 1px solid #999; }
        .active { background: #007bff; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h1>數據監控面板</h1>
    <div id="tabs"></div>
    <table id="table">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        // 填入你剛剛獲得的 Apps Script 網址
        const apiUrl = "https://script.google.com/macros/s/AKfycbzzT-AorCGAZZhiuwhUoq0DheCGF-J9GExxxBdlIyuMhIBWlIBkD4an1tT3mO79yINm/exec";
        let allData = [];
        let currentTab = "";

        async function fetchData() {
            try {
                // 加上 t 參數強制清除快取，確保每 5 秒拿到最新資料
                const res = await fetch(apiUrl + "?t=" + new Date().getTime());
                allData = await res.json();
                
                // 假設資料結構是 [日期, 時間, 期數, ...]
                renderTabs();
            } catch (e) {
                console.error("抓取資料失敗", e);
            }
        }

        function renderTabs() {
            const dates = [...new Set(allData.slice(1).map(row => row[0]))].sort().reverse();
            if (!currentTab) currentTab = dates[0];
            
            document.getElementById('tabs').innerHTML = dates.map(d => 
                `<button class="tab-btn ${currentTab==d?'active':''}" onclick="currentTab='${d}'; renderTable();">${d}</button>`
            ).join('');
            renderTable();
        }

        function renderTable() {
            const headers = allData[0];
            document.getElementById('thead').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
            document.getElementById('tbody').innerHTML = allData
                .filter(row => row[0] === currentTab)
                .map(row => `<tr>${row.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
        }

        // 5 秒自動更新一次
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
