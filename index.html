<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時數據監控</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
        #status { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>即時數據監控系統</h1>
    <div id="status">正在初始化資料...</div>
    <table id="data-table">
        <thead>
            <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLh71hif9leRiu_gfg_ifAvu0n2ZwDKiOXiu6uS9TyxX3bamZt43A1bv5uqJJgq-yrNLqAd8GQ6ma3/pub?output=csv";

        async function updateData() {
            try {
                // 加上時間戳記防止瀏覽器讀到舊的快取資料
                const response = await fetch(csvUrl + "&t=" + new Date().getTime());
                const data = await response.text();
                
                const rows = data.split('\n').filter(row => row.trim() !== "");
                const tbody = document.getElementById("table-body");
                const thead = document.getElementById("table-head");
                
                tbody.innerHTML = "";
                
                // 處理表頭 (第一行)
                const headers = rows[0].split(',');
                thead.innerHTML = headers.map(h => `<th>${h}</th>`).join('');
                
                // 處理資料行 (顯示最近的 10 筆)
                rows.slice(-10).forEach(row => {
                    const cols = row.split(',');
                    const tr = document.createElement("tr");
                    cols.forEach(col => {
                        const td = document.createElement("td");
                        td.innerText = col;
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
                
                document.getElementById("status").innerText = "最後更新時間: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById("status").innerText = "讀取資料失敗，請檢查網路。";
                console.error(e);
            }
        }

        // 每 60 秒執行一次
        setInterval(updateData, 60000);
        updateData(); // 頁面載入時先執行一次
    </script>
</body>
</html>
