<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儀表板 - 智能分析</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; padding: 10px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #live-clock { font-size: 1.1em; color: #d35400; font-weight: bold; }
        #controls { margin-bottom: 20px; text-align: center; }
        select { padding: 10px; font-size: 16px; margin-right: 10px; }
        .refresh-btn { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; }
        
        /* 10個輸入框專屬區域 */
        .manual-input-zone { margin: 15px 0; display: flex; justify-content: center; gap: 5px; }
        .manual-input-zone input { width: 35px; padding: 5px; text-align: center; border: 1px solid #999; }
        
        .content-wrapper { display: flex; flex-wrap: wrap; gap: 20px; }
        #left-pane { flex: 2; min-width: 300px; }
        #right-pane { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        #table-container { height: 500px; overflow-y: auto; background: white; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #2c3e50; color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        
        /* 高亮樣式 */
        .highlight { border: 2px solid red !important; color: red; font-weight: bold; padding: 2px; border-radius: 3px; }
        
        .stats-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; }
        .prediction-box { background: #e8f6f3; padding: 15px; border-radius: 8px; border: 1px solid #1abc9c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h2>即時儀表板</h2>
            <div id="live-clock"></div>
        </div>

        <div id="controls">
            <select id="date-select" onchange="renderView(this.value)"></select>
            <button class="refresh-btn" onclick="loadData(true)">🔄 更新數據</button>
            <div class="manual-input-zone" id="manual-inputs"></div>
        </div>

        <div class="content-wrapper">
            <div id="left-pane">
                <div id="table-container">
                    <table id="draws-table"><thead><tr><th>期別</th><th>號碼</th></tr></thead><tbody></tbody></table>
                </div>
            </div>
            <div id="right-pane">
                <div class="stats-box">
                    <div id="top-stats"></div>
                    <div id="bottom-stats"></div>
                </div>
                <div class="prediction-box">
                    <h4>智能選號 (回歸平均法)</h4>
                    <input type="number" id="num-count" value="10" style="width:50px;">
                    <button onclick="generatePrediction()">執行選號</button>
                    <p id="prediction-result" style="font-weight:bold;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化輸入框
        const inputZone = document.getElementById('manual-inputs');
        for(let i=0; i<10; i++) {
            let inp = document.createElement('input');
            inp.type = 'number';
            inp.oninput = () => renderView(document.getElementById('date-select').value);
            inputZone.appendChild(inp);
        }

        let allGroupedData = {}, currentSortedStats = [], totalDraws = 0;

        function renderView(date) {
            const rows = allGroupedData[date];
            if (!rows) return;
            const tbody = document.querySelector("#draws-table tbody");
            tbody.innerHTML = '';
            
            // 取得使用者輸入的數字陣列
            const userNums = Array.from(document.querySelectorAll('.manual-input-zone input'))
                                  .map(i => i.value.trim()).filter(v => v !== "");

            rows.sort((a, b) => b.期別 - a.期別).forEach(r => {
                let numsHTML = [];
                for(let i=1; i<=20; i++) {
                    let val = r[`號碼${i}`];
                    // 若數字在輸入框中，給予 highlight 類別
                    let css = userNums.includes(val) ? 'class="highlight"' : '';
                    numsHTML.push(`<span ${css}>${val}</span>`);
                }
                tbody.innerHTML += `<tr><td>${r.期別}</td><td>${numsHTML.join(', ')}</td></tr>`;
            });
            calculateStats(rows);
        }

        // ... 保留你原有的 loadData, calculateStats, generatePrediction 函數 ...
        // (為了完整性，請確保你原有的邏輯代碼放在下面)
        
        // ... [請將你之前的 loadData, calculateStats, generatePrediction 函數放回此處] ...
        // 為了確保運作，我將這些函數合併在這裡：

        function loadData() {
            Papa.parse("data.csv?t=" + new Date().getTime(), {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    allGroupedData = results.data.reduce((acc, r) => {
                        if (r.日期) {
                            if (!acc[r.日期]) acc[r.日期] = [];
                            acc[r.日期].push(r);
                        }
                        return acc;
                    }, {});
                    const dates = Object.keys(allGroupedData).sort().reverse();
                    const select = document.getElementById('date-select');
                    select.innerHTML = '';
                    dates.forEach(d => {
                        let opt = document.createElement('option');
                        opt.value = d; opt.innerText = d;
                        select.appendChild(opt);
                    });
                    renderView(dates[0]);
                }
            });
        }

        function calculateStats(rows) {
            let counts = {}; totalDraws = rows.length;
            rows.forEach(r => { for(let i=1; i<=20; i++) { let val = r[`號碼${i}`]; if(val) counts[val] = (counts[val] || 0) + 1; } });
            currentSortedStats = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        }

        function generatePrediction() {
            // (這就是你確認過的那個邏輯)
            let weightedPool = [];
            currentSortedStats.forEach(item => {
                let num = parseInt(item[0]);
                let pct = (item[1] / totalDraws) * 100;
                let weight = (pct < 15) ? 5 : (pct > 35) ? 0.5 : 2;
                for(let i = 0; i < weight * 10; i++) weightedPool.push(num);
            });
            let result = new Set();
            while(result.size < parseInt(document.getElementById('num-count').value)) {
                result.add(weightedPool[Math.floor(Math.random() * weightedPool.length)]);
            }
            document.getElementById('prediction-result').innerText = "推薦: " + Array.from(result).sort((a,b)=>a-b).join(', ');
        }

        loadData();
    </script>
</body>
</html>
