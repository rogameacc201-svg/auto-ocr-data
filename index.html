<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>賓果開獎統計儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { display: flex; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f7f6; }
        #sidebar { width: 220px; padding: 20px; background: #2c3e50; color: white; height: 100vh; overflow-y: auto; }
        #main { padding: 30px; flex-grow: 1; }
        button { width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; background: #34495e; border: none; color: white; border-radius: 4px; }
        button:hover { background: #1abc9c; }
        table { border-collapse: collapse; width: 100%; background: white; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; }
        .stats-container { display: flex; gap: 20px; }
        .stats-box { flex: 1; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>選擇日期</h3>
        <div id="date-list"></div>
    </div>
    <div id="main">
        <h1 id="current-date">請選擇日期</h1>
        <div class="stats-container">
            <div class="stats-box"><h3>熱門號碼</h3><div id="top-stats"></div></div>
            <div class="stats-box"><h3>冷門號碼</h3><div id="bottom-stats"></div></div>
        </div>
        <h3>詳細記錄</h3><div id="draws-table"></div>
    </div>

    <script>
        Papa.parse("data.csv", {
            download: true, header: true,
            complete: function(results) {
                const data = results.data.filter(row => row.日期);
                const grouped = data.reduce((acc, row) => {
                    if (!acc[row.日期]) acc[row.日期] = [];
                    acc[row.日期].push(row);
                    return acc;
                }, {});

                const dateList = document.getElementById('date-list');
                Object.keys(grouped).sort().reverse().forEach(date => {
                    const btn = document.createElement('button');
                    btn.innerText = date;
                    btn.onclick = () => updateView(date, grouped);
                    dateList.appendChild(btn);
                });

                function updateView(date, grouped) {
                    const dayData = grouped[date];
                    document.getElementById('current-date').innerText = `日期: ${date} (共 ${dayData.length} 期)`;
                    const counts = {};
                    dayData.forEach(row => {
                        for(let i=1; i<=20; i++) {
                            let n = row[`號碼${i}`];
                            if(n) counts[n] = (counts[n] || 0) + 1;
                        }
                    });
                    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
                    const renderTable = (arr) => {
                        let h = "<table><tr><th>號碼</th><th>次數</th></tr>";
                        arr.forEach(([n, c]) => h += `<tr><td>${n}</td><td>${c}</td></tr>`);
                        return h + "</table>";
                    };
                    document.getElementById('top-stats').innerHTML = renderTable(sorted.slice(0, 10));
                    document.getElementById('bottom-stats').innerHTML = renderTable(sorted.slice(-10).reverse());
                    
                    let listHtml = "<table><tr><th>期別</th><th>號碼</th></tr>";
                    dayData.forEach(r => {
                        let nums = [];
                        for(let i=1; i<=20; i++) if(r[`號碼${i}`]) nums.push(r[`號碼${i}`]);
                        listHtml += `<tr><td>${r.期別}</td><td>${nums.join(', ')}</td></tr>`;
                    });
                    document.getElementById('draws-table').innerHTML = listHtml + "</table>";
                }
            }
        });
    </script>
</body>
</html>
