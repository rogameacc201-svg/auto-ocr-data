<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>賓果開獎統計儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; background-color: #f4f7f6; }
        #sidebar { width: 200px; padding: 20px; background: #2c3e50; color: white; height: 100vh; overflow-y: auto; }
        #main { padding: 30px; flex-grow: 1; display: flex; gap: 20px; }
        #data-view { flex-grow: 2; }
        #stats-view { flex-grow: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; background: #34495e; color: white; border: none; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <div id="sidebar"><h3>選擇日期</h3><div id="date-list"></div></div>
    <div id="main">
        <div id="data-view">
            <h1 id="current-date">請選擇日期</h1>
            <div id="draws-table"></div>
        </div>
        <div id="stats-view">
            <h3>統計分析 (開出率)</h3>
            <div id="stats-content">請選擇日期以查看統計</div>
        </div>
    </div>
    <script>
        Papa.parse("data.csv?t=" + new Date().getTime(), {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const grouped = data.reduce((acc, r) => {
                    if (r.日期) {
                        if (!acc[r.日期]) acc[r.日期] = [];
                        acc[r.日期].push(r);
                    }
                    return acc;
                }, {});

                Object.keys(grouped).sort().reverse().forEach(date => {
                    const btn = document.createElement('button');
                    btn.innerText = date;
                    btn.onclick = () => {
                        // 1. 顯示開獎內容
                        document.getElementById('current-date').innerText = date;
                        let h = "<table><tr><th>期別</th><th>號碼</th></tr>";
                        grouped[date].forEach(r => {
                            let nums = Object.keys(r).filter(k => k.startsWith('號碼')).map(k => r[k]);
                            h += `<tr><td>${r.期別}</td><td>${nums.join(', ')}</td></tr>`;
                        });
                        document.getElementById('draws-table').innerHTML = h + "</table>";

                        // 2. 計算統計
                        calculateStats(grouped[date]);
                    };
                    document.getElementById('date-list').appendChild(btn);
                });
            }
        });

        function calculateStats(rows) {
            let counts = {};
            let totalDraws = rows.length;
            rows.forEach(r => {
                for(let i=1; i<=20; i++) {
                    let val = r[`號碼${i}`];
                    if(val) counts[val] = (counts[val] || 0) + 1;
                }
            });

            let sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            let top10 = sorted.slice(0, 10);
            let bottom10 = sorted.slice(-10).reverse();

            let html = "<h4>次數最多 (Top 10)</h4><ul>";
            top10.forEach(x => html += `<li>${x[0]}: ${x[1]}次 (${(x[1]/totalDraws*100).toFixed(1)}%)</li>`);
            html += "</ul><h4>次數最少 (Bottom 10)</h4><ul>";
            bottom10.forEach(x => html += `<li>${x[0]}: ${x[1]}次 (${(x[1]/totalDraws*100).toFixed(1)}%)</li>`);
            document.getElementById('stats-content').innerHTML = html + "</ul>";
        }
    </script>
</body>
</html>
