<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時統計儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; padding: 10px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #live-clock { font-size: 1.1em; color: #d35400; font-weight: bold; }
        #controls { margin-bottom: 20px; text-align: center; }
        select { padding: 10px; font-size: 16px; margin-right: 10px; }
        .refresh-btn { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; }
        .manual-input-zone { margin: 15px 0; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .manual-input-zone input { width: 35px; padding: 5px; text-align: center; border: 1px solid #999; }
        .content-wrapper { display: flex; flex-wrap: wrap; gap: 20px; }
        #left-pane { flex: 2; min-width: 300px; }
        #right-pane { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .stats-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.85em; }
        .side-by-side { display: flex; justify-content: space-between; gap: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #2c3e50; color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .highlight { border: 2px solid red !important; color: red; font-weight: bold; padding: 2px; border-radius: 3px; }
        .prediction-box { background: #e8f6f3; padding: 15px; border-radius: 8px; border: 1px solid #1abc9c; }
        ul { padding-left: 20px; margin: 5px 0; }
        h4 { margin: 10px 0 5px 0; color: #2c3e50; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h2>即時儀表板</h2>
            <div id="live-clock"></div>
        </div>
        <div id="controls">
            <select id="date-select" onchange="renderView(this.value)"></select>
            <button class="refresh-btn" onclick="loadData(true)">🔄 更新數據</button>
            <div style="margin-top: 15px; font-weight: bold; color: #34495e;">請輸入你選的號碼：</div>
            <div class="manual-input-zone" id="manual-inputs"></div>
        </div>
        <div class="content-wrapper">
            <div id="left-pane">
                <div id="table-container" style="height: 500px; overflow-y: auto; background: white; border: 1px solid #ddd;">
                    <table id="draws-table"><thead><tr><th>期別</th><th>號碼</th></tr></thead><tbody></tbody></table>
                </div>
            </div>
            <div id="right-pane">
                <div class="stats-box">
                    <div class="side-by-side">
                        <div id="top-stats"></div>
                        <div id="streak-stats"></div>
                    </div>
                    <hr>
                    <div class="side-by-side">
                        <div id="bottom-stats"></div>
                        <div id="gap-stats"></div>
                    </div>
                </div>
                <div class="prediction-box">
                    <h4>智能選號</h4>
                    <p id="prediction-result" style="font-weight:bold;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputZone = document.getElementById('manual-inputs');
        for(let i=0; i<10; i++) {
            let inp = document.createElement('input');
            inp.type = 'number';
            inp.oninput = () => renderView(document.getElementById('date-select').value);
            inputZone.appendChild(inp);
        }

        let allGroupedData = {};

        function loadData() {
            Papa.parse("data.csv?t=" + new Date().getTime(), {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    allGroupedData = results.data.reduce((acc, r) => {
                        if (r.日期) {
                            if (!acc[r.日期]) acc[r.日期] = [];
                            acc[r.日期].push(r);
                        }
                        return acc;
                    }, {});
                    const dates = Object.keys(allGroupedData).sort().reverse();
                    const select = document.getElementById('date-select');
                    dates.forEach(d => {
                        let opt = document.createElement('option');
                        opt.value = d; opt.innerText = d;
                        select.appendChild(opt);
                    });
                    renderView(dates[0]);
                }
            });
        }

        function renderView(date) {
            const rows = allGroupedData[date];
            if (!rows) return;
            const tbody = document.querySelector("#draws-table tbody");
            tbody.innerHTML = '';
            const userNums = Array.from(document.querySelectorAll('.manual-input-zone input')).map(i => i.value.trim()).filter(v => v !== "");
            rows.sort((a, b) => b.期別 - a.期別).forEach(r => {
                let nums = [];
                for(let i=1; i<=20; i++) {
                    let val = String(r[`號碼${i}`]);
                    nums.push(`<span ${userNums.includes(val) ? 'class="highlight"' : ''}>${val}</span>`);
                }
                tbody.innerHTML += `<tr><td>${r.期別}</td><td>${nums.join(', ')}</td></tr>`;
            });
            calculateStats(rows);
        }

        function calculateStats(rows) {
            let counts = {}, streak = {}, gap = {};
            let allNums = Array.from({length: 80}, (_, i) => String(i + 1));
            rows.forEach(r => { for(let i=1; i<=20; i++) { let v = String(r[`號碼${i}`]); counts[v] = (counts[v] || 0) + 1; } });
            
            allNums.forEach(n => {
                let s = 0; for(let i=0; i<rows.length; i++) {
                    let rNums = []; for(let j=1; j<=20; j++) rNums.push(String(rows[i][`號碼${j}`]));
                    if(rNums.includes(n)) s++; else break;
                }
                if(s > 1) streak[n] = s;
                let g = 0; for(let i=0; i<rows.length; i++) {
                    let rNums = []; for(let j=1; j<=20; j++) rNums.push(String(rows[i][`號碼${j}`]));
                    if(rNums.includes(n)) break; g++;
                }
                if(g > 0) gap[n] = g;
            });

            document.getElementById('top-stats').innerHTML = "<h4>熱門</h4><ul>" + Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>`<li>${x[0]}: ${x[1]}次</li>`).join('') + "</ul>";
            document.getElementById('streak-stats').innerHTML = "<h4>連出</h4><ul>" + Object.entries(streak).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>`<li>${x[0]}: ${x[1]}次</li>`).join('') + "</ul>";
            document.getElementById('bottom-stats').innerHTML = "<h4>冷門</h4><ul>" + Object.entries(counts).sort((a,b)=>a[1]-b[1]).slice(0,10).map(x=>`<li>${x[0]}: ${x[1]}次</li>`).join('') + "</ul>";
            document.getElementById('gap-stats').innerHTML = "<h4>未出</h4><ul>" + Object.entries(gap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>`<li>${x[0]}: ${x[1]}次</li>`).join('') + "</ul>";
        }

        setInterval(() => loadData(), 60000);
        loadData();
    </script>
</body>
</html>
