<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數據監控系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tabs { margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; background-color: #f0f0f0; margin-right: 5px; }
        .tab-btn.active { background-color: #007bff; color: white; border: 1px solid #0056b3; }
        table { border-collapse: collapse; width: 100%; max-width: 900px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        #status { margin-bottom: 10px; color: #555; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>即時數據監控系統</h1>
    <div id="status">正在初始化資料...</div>
    <div id="tabs" class="tabs"></div>
    <table id="data-table">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        // --- 請將下方的網址替換為你發布的 CSV 網址 ---
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSLh71hif9leRiu_gfg_ifAvu0n2ZwDKiOXiu6uS9TyxX3bamZt43A1bv5uqJJgq-yrNLqAd8GQ6ma3/pub?output=csv";
        
        let dataMap = {};
        let currentTab = "";

        async function loadData() {
            try {
                // 使用時間戳記避免讀到舊資料
                const response = await fetch(csvUrl + "&t=" + new Date().getTime());
                const text = await response.text();
                const rows = text.split('\n').filter(r => r.trim() !== "");
                
                if (rows.length < 1) return;

                const headers = rows[0].split(',');
                dataMap = {};

                // 從第二行開始處理資料
                rows.slice(1).forEach(row => {
                    const cols = row.split(',');
                    const date = cols[0]; // 第一欄是日期
                    if (!dataMap[date]) dataMap[date] = [];
                    dataMap[date].push(cols);
                });

                // 自動選擇最新的日期作為預設分頁
                const dates = Object.keys(dataMap).sort().reverse();
                if (!currentTab || !dataMap[currentTab]) {
                    currentTab = dates[0];
                }

                render(headers);
                document.getElementById('status').innerText = "最後更新時間: " + new Date().toLocaleTimeString();
            } catch (err) {
                document.getElementById('status').innerText = "讀取資料失敗，請確認網址或網路狀況。";
                console.error(err);
            }
        }

        function render(headers) {
            // 渲染頁籤
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = Object.keys(dataMap).sort().reverse().map(date => 
                `<button class="tab-btn ${currentTab === date ? 'active' : ''}" onclick="changeTab('${date}')">${date}</button>`
            ).join('');

            // 渲染表格內容
            document.getElementById('thead').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
            document.getElementById('tbody').innerHTML = dataMap[currentTab].map(row => 
                `<tr>${row.map(c => `<td>${c}</td>`).join('')}</tr>`
            ).join('');
        }

        function changeTab(date) {
            currentTab = date;
            loadData(); // 重新渲染當前頁籤
        }

        // 每 60 秒自動重新讀取一次
        setInterval(loadData, 60000);
        loadData();
    </script>
</body>
</html>
