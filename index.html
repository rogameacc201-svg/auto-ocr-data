<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賓果開獎統計</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; padding: 10px; }
        .container { max-width: 900px; margin: 0 auto; } /* 電腦版面放中間 */
        
        #controls { margin-bottom: 20px; text-align: center; }
        select { width: 100%; max-width: 400px; padding: 12px; font-size: 16px; }

        /* 捲軸表格區域 */
        #table-container { 
            height: 400px; /* 約顯示 10 筆的高度 */
            overflow-y: auto; 
            background: white; 
            border: 1px solid #ddd;
        }
        
        table { border-collapse: collapse; width: 100%; }
        th { position: sticky; top: 0; background: #2c3e50; color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        
        .stats-box { background: white; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h2>賓果開獎統計儀表板</h2>
        <div id="controls">
            <select id="date-select"></select>
        </div>

        <div id="table-container">
            <table id="draws-table">
                <thead><tr><th>期別</th><th>號碼</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="stats-view" class="stats-box">
            <h3>統計分析 (該日期內)</h3>
            <div id="stats-content">請選擇日期</div>
        </div>
    </div>

    <script>
        Papa.parse("data.csv?t=" + new Date().getTime(), {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const grouped = results.data.reduce((acc, r) => {
                    if (r.日期) {
                        if (!acc[r.日期]) acc[r.日期] = [];
                        acc[r.日期].push(r);
                    }
                    return acc;
                }, {});

                const select = document.getElementById('date-select');
                Object.keys(grouped).sort().reverse().forEach(date => {
                    let opt = document.createElement('option');
                    opt.value = date; opt.innerText = date;
                    select.appendChild(opt);
                });

                select.onchange = function() {
                    const rows = grouped[this.value];
                    const tbody = document.querySelector("#draws-table tbody");
                    tbody.innerHTML = '';
                    
                    // 按照期別顯示 (最新的在最下面)
                    rows.sort((a, b) => a.期別 - b.期別).forEach(r => {
                        let nums = Object.keys(r).filter(k => k.startsWith('號碼')).map(k => r[k]);
                        tbody.innerHTML += `<tr><td>${r.期別}</td><td>${nums.join(', ')}</td></tr>`;
                    });

                    // 自動捲動到底部顯示最新的期別
                    const container = document.getElementById('table-container');
                    container.scrollTop = container.scrollHeight;

                    calculateStats(rows);
                };
                select.onchange();
            }
        });

        function calculateStats(rows) {
            let counts = {};
            rows.forEach(r => {
                for(let i=1; i<=20; i++) {
                    let val = r[`號碼${i}`];
                    if(val) counts[val] = (counts[val] || 0) + 1;
                }
            });
            let sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            let html = "<h4>Top 10</h4><ul>" + sorted.slice(0,10).map(x => `<li>${x[0]}: ${(x[1]/rows.length*100).toFixed(1)}%</li>`).join('') + "</ul>";
            html += "<h4>Bottom 10</h4><ul>" + sorted.slice(-10).reverse().map(x => `<li>${x[0]}: ${(x[1]/rows.length*100).toFixed(1)}%</li>`).join('') + "</ul>";
            document.getElementById('stats-content').innerHTML = html;
        }
    </script>
</body>
</html>
