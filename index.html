<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>賓果開獎紀錄</title>
    <style>table { width: 100%; border-collapse: collapse; } th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }</style>
</head>
<body>
    <h2>開獎號碼紀錄表</h2>
    <div id="table-container">載入中...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.1/papaparse.min.js"></script>
    <script>
        Papa.parse("data.csv", {
            download: true, header: true,
            complete: function(results) {
                let html = '<table><thead><tr>' + results.meta.fields.map(f => `<th>${f}</th>`).join('') + '</tr></thead><tbody>';
                results.data.forEach(row => html += '<tr>' + Object.values(row).map(v => `<td>${v}</td>`).join('') + '</tr>');
                document.getElementById('table-container').innerHTML = html + '</tbody></table>';
            }
        });
    </script>
</body>
</html>
