<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時統計儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; padding: 10px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #live-clock { font-size: 1.1em; color: #d35400; font-weight: bold; }
        #controls { margin-bottom: 20px; text-align: center; }
        select { padding: 10px; font-size: 16px; margin-right: 10px; }
        .refresh-btn { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; }
        .manual-input-zone { margin: 15px 0; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .manual-input-zone input { width: 35px; padding: 5px; text-align: center; border: 1px solid #999; }
        .content-wrapper { display: flex; flex-wrap: wrap; gap: 20px; }
        #left-pane { flex: 2; min-width: 300px; }
        #right-pane { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        #table-container { height: 500px; overflow-y: auto; background: white; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #2c3e50; color: white; padding: 10px; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .highlight { border: 2px solid red !important; color: red; font-weight: bold; padding: 2px; border-radius: 3px; }
        
        .stats-box { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; }
        .stats-container { display: flex; flex-direction: column; gap: 15px; }
        .stats-row { display: flex; justify-content: space-between; gap: 10px; }
        .stats-col { width: 48%; }
        
        .prediction-box { background: #e8f6f3; padding: 15px; border-radius: 8px; border: 1px solid #1abc9c; margin-bottom: 10px; }
        ul { padding-left: 20px; margin: 5px 0; font-size: 0.85em; list-style-type: disc; }
        h4 { margin: 5px 0; color: #2c3e50; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h2>即時儀表板</h2>
            <div id="live-clock"></div>
        </div>
        <div id="controls">
            <select id="date-select" onchange="renderView(this.value)"></select>
            <button class="refresh-btn" onclick="loadData(true)">🔄 更新數據</button>
            <div style="margin-top: 15px; font-weight: bold; color: #34495e;">請輸入你選的號碼：</div>
            <div class="manual-input-zone" id="manual-inputs"></div>
        </div>
        <div class="content-wrapper">
            <div id="left-pane">
                <div id="table-container">
                    <table id="draws-table"><thead><tr><th>期別</th><th>號碼</th></tr></thead><tbody></tbody></table>
                </div>
            </div>
            <div id="right-pane">
                <div class="prediction-box">
                    <h4>智能選號</h4>
                    <input type="number" id="num-count" value="10" style="width:50px;">
                    <button onclick="generatePrediction()">執行選號</button>
                    <p id="prediction-result" style="font-weight:bold;"></p>
                </div>
                <div class="stats-box">
                    <h4>當日統計</h4>
                    <div id="stats-area"></div>
                </div>
                <div class="stats-box">
                    <h4>自訂區間篩選統計</h4>
                    <div style="margin-bottom:10px; font-size:0.8em;">
                        <input type="text" id="start-date" placeholder="2026/06/01" style="width:80px;"> 至 
                        <input type="text" id="end-date" placeholder="2026/06/30" style="width:80px;">
                        <button onclick="calculateFilterStats()">計算</button>
                    </div>
                    <div id="filter-area"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputZone = document.getElementById('manual-inputs');
        for(let i=0; i<10; i++) {
            let inp = document.createElement('input');
            inp.type = 'number';
            inp.oninput = () => renderView(document.getElementById('date-select').value);
            inputZone.appendChild(inp);
        }

        let allGroupedData = {}, allRows = [], currentSortedStats = [];

        function loadData() {
            Papa.parse("data.csv?t=" + new Date().getTime(), {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    allRows = results.data;
                    allGroupedData = allRows.reduce((acc, r) => {
                        if (r.日期) {
                            if (!acc[r.日期]) acc[r.日期] = [];
                            acc[r.日期].push(r);
                        }
                        return acc;
                    }, {});
                    const dates = Object.keys(allGroupedData).sort().reverse();
                    const select = document.getElementById('date-select');
                    const currentVal = select.value;
                    select.innerHTML = '';
                    dates.forEach(d => {
                        let opt = document.createElement('option');
                        opt.value = d; opt.innerText = d;
                        select.appendChild(opt);
                    });
                    select.value = (currentVal && dates.includes(currentVal)) ? currentVal : dates[0];
                    renderView(select.value);
                }
            });
        }

        function updateStatsUI(rows, targetId) {
            let counts = {}, streak = {}, gap = {};
            let allNums = Array.from({length: 80}, (_, i) => String(i + 1));
            let total = rows.length || 1;
            rows.forEach(r => { for(let i=1; i<=20; i++) { let v = String(r[`號碼${i}`]); counts[v] = (counts[v] || 0) + 1; } });
            allNums.forEach(n => {
                let s = 0; for(let i=0; i<rows.length; i++) { let rNums = []; for(let j=1; j<=20; j++) rNums.push(String(rows[i][`號碼${j}`])); if(rNums.includes(n)) s++; else break; }
                if(s > 1) streak[n] = s;
                let g = 0; for(let i=0; i<rows.length; i++) { let rNums = []; for(let j=1; j<=20; j++) rNums.push(String(rows[i][`號碼${j}`])); if(rNums.includes(n)) break; g++; }
                if(g > 0) gap[n] = g;
            });
            document.getElementById(targetId).innerHTML = `
                <div class="stats-container">
                    <div class="stats-row">
                        <div class="stats-col"><h4>熱門</h4><ul>${Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>`<li>${x[0]}: ${x[1]}次 (${((x[1]/total)*100).toFixed(1)}%)</li>`).join('')}</ul></div>
                        <div class="stats-col"><h4>連續</h4><ul>${Object.entries(streak).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>`<li>${x[0]}: 連續 ${x[1]} 期</li>`).join('')}</ul></div>
                    </div>
                    <div class="stats-row">
                        <div class="stats-col"><h4>冷門</h4><ul>${Object.entries(counts).sort((a,b)=>a[1]-b[1]).slice(0,10).map(x=>`<li>${x[0]}: ${x[1]}次 (${((x[1]/total)*100).toFixed(1)}%)</li>`).join('')}</ul></div>
                        <div class="stats-col"><h4>遺漏</h4><ul>${Object.entries(gap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>`<li>${x[0]}: 遺漏 ${x[1]} 期</li>`).join('')}</ul></div>
                    </div>
                </div>
            `;
            return Object.entries(counts).sort((a, b) => b[1] - a[1]);
        }

        function renderView(date) {
            const rows = allGroupedData[date];
            if (!rows) return;
            const tbody = document.querySelector("#draws-table tbody");
            tbody.innerHTML = '';
            const userNums = Array.from(document.querySelectorAll('.manual-input-zone input')).map(i => i.value.trim()).filter(v => v !== "");
            rows.sort((a, b) => b.期別 - a.期別).forEach(r => {
                let numsHTML = [];
                for(let i=1; i<=20; i++) { let val = String(r[`號碼${i}`]); numsHTML.push(`<span ${userNums.includes(val) ? 'class="highlight"' : ''}>${val}</span>`); }
                tbody.innerHTML += `<tr><td>${r.期別}</td><td>${numsHTML.join(', ')}</td></tr>`;
            });
            currentSortedStats = updateStatsUI(rows, 'stats-area');
        }

        function calculateFilterStats() {
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            if (!start || !end) return;
            const filtered = allRows.filter(r => r.日期 >= start && r.日期 <= end);
            updateStatsUI(filtered, 'filter-area');
        }

        function generatePrediction() {
            const count = parseInt(document.getElementById('num-count').value);
            const hot = currentSortedStats.slice(0, 10).map(x => parseInt(x[0]));
            const cold = currentSortedStats.slice(-10).reverse().map(x => parseInt(x[0]));
            const isNight = new Date().getHours() >= 20;
            let result = [];
            for (let i = 0; i < count; i++) {
                let source = (isNight ? (i % 3 !== 2) : (i % 3 === 2)) ? cold : hot;
                result.push(source[i % source.length]);
            }
            document.getElementById('prediction-result').innerText = (isNight ? "【晚上策略：冷門】 " : "【白天策略：熱門】 ") + Array.from(new Set(result)).sort((a,b)=>a-b).join(', ');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = "台北時間: " + now.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
        }
        setInterval(updateClock, 1000);
        updateClock();
        loadData();
    </script>
</body>
</html>
