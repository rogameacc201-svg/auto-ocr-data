<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賓果統計儀表板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        #main { display: flex; flex-direction: column; padding: 10px; flex-grow: 1; overflow-y: auto; }
        
        /* 響應式佈局：大螢幕水平，小螢幕垂直 */
        @media (min-width: 768px) {
            #main { flex-direction: row; gap: 20px; }
            #sidebar { width: 300px; }
        }

        select { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 20px; }
        table { border-collapse: collapse; width: 100%; background: white; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .stats-box { background: white; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <header>賓果開獎統計</header>
    <div id="main">
        <div id="sidebar">
            <h3>選擇日期</h3>
            <select id="date-select"></select>
            <div id="draws-table"></div>
        </div>
        <div id="stats-view" class="stats-box">
            <h3>統計分析 (選定日期內)</h3>
            <div id="stats-content">請從下拉選單選擇日期</div>
        </div>
    </div>
    <script>
        Papa.parse("data.csv?t=" + new Date().getTime(), {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const grouped = results.data.reduce((acc, r) => {
                    if (r.日期) {
                        if (!acc[r.日期]) acc[r.日期] = [];
                        acc[r.日期].push(r);
                    }
                    return acc;
                }, {});

                const select = document.getElementById('date-select');
                Object.keys(grouped).sort().reverse().forEach(date => {
                    let opt = document.createElement('option');
                    opt.value = date;
                    opt.innerText = date;
                    select.appendChild(opt);
                });

                select.onchange = function() {
                    const date = this.value;
                    const rows = grouped[date];
                    
                    // 只顯示最後 10 筆
                    let latest10 = rows.slice(-10).reverse();
                    let h = "<table><tr><th>期別</th><th>號碼</th></tr>";
                    latest10.forEach(r => {
                        let nums = Object.keys(r).filter(k => k.startsWith('號碼')).map(k => r[k]);
                        h += `<tr><td>${r.期別}</td><td>${nums.join(', ')}</td></tr>`;
                    });
                    document.getElementById('draws-table').innerHTML = h + "</table>";

                    // 統計計算
                    calculateStats(rows);
                };
                select.onchange(); // 初始化
            }
        });

        function calculateStats(rows) {
            let counts = {};
            rows.forEach(r => {
                for(let i=1; i<=20; i++) {
                    let val = r[`號碼${i}`];
                    if(val) counts[val] = (counts[val] || 0) + 1;
                }
            });
            let sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            let html = "<h4>Top 10</h4><ul>" + sorted.slice(0,10).map(x => `<li>${x[0]}: ${(x[1]/rows.length*100).toFixed(1)}%</li>`).join('') + "</ul>";
            html += "<h4>Bottom 10</h4><ul>" + sorted.slice(-10).reverse().map(x => `<li>${x[0]}: ${(x[1]/rows.length*100).toFixed(1)}%</li>`).join('') + "</ul>";
            document.getElementById('stats-content').innerHTML = html;
        }
    </script>
</body>
</html>
